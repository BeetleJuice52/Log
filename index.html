<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Log</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1420;--bg2:#131b28;--bg3:#192030;--border:#1e3048;--border2:#253a55;--text:#ddeeff;--text2:#8aaac8;--text3:#4a6a8a;--teal:#4af0c8;--gold:#f0d060;--purple:#b088ff;--orange:#ff9040;--red:#ff5555;--green:#30e888;--blue:#60b8ff}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--border2)}
.orb{font-family:'Orbitron',monospace}
button{cursor:pointer;border:none;font-family:'Rajdhani',sans-serif}
input{outline:none;font-family:'Rajdhani',sans-serif}
input::placeholder{color:var(--text3)}
#header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 18px 12px;position:sticky;top:0;z-index:50}
#app-title{font-family:'Orbitron';font-size:26px;font-weight:900;color:#fff;letter-spacing:4px;text-shadow:0 0 20px rgba(74,240,200,0.2)}
#sys-label{font-family:'Orbitron';font-size:9px;letter-spacing:4px;color:var(--text3);margin-bottom:3px}
#pct-val{font-family:'Orbitron';font-size:22px;font-weight:700;transition:color 0.3s}
#pct-label{font-family:'Orbitron';font-size:8px;color:var(--text3);letter-spacing:2px}
#prog-wrap{margin-top:10px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
#prog-bar{height:100%;width:0%;transition:width 0.5s ease;border-radius:2px}
#date-strip{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
#train-badge{font-size:12px;color:var(--teal);font-weight:600}
#macro-strip{display:flex;gap:8px;margin-top:10px}
.mc{background:var(--bg3);border-radius:4px;padding:6px 10px;border:1px solid var(--border2)}
.mcl{font-family:'Orbitron';font-size:7px;color:var(--text3);letter-spacing:1.5px;margin-bottom:2px}
.mcv{font-family:'Orbitron';font-size:12px;font-weight:700}
#cal-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
#cal-wrap::-webkit-scrollbar{display:none}
#cal-inner{display:flex;padding:8px 10px;gap:5px;min-width:max-content}
.cd{min-width:42px;padding:7px 4px;border-radius:5px;text-align:center;background:transparent;border:1px solid transparent;transition:all 0.15s;cursor:pointer}
.cd:hover{background:rgba(74,240,200,0.06)}
.cd.today{background:var(--bg3);border-color:var(--border2)}
.cd.active{background:#162a40;border-color:var(--teal)}
#tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 13px;border-bottom:2px solid transparent;color:var(--text3);transition:all 0.15s;background:none}
.tab.active{border-bottom-color:var(--teal);color:var(--teal)}
.tab-icon{font-family:'Orbitron';font-size:8px;letter-spacing:1px;margin-bottom:2px}
.tab-label{font-size:9px;letter-spacing:1.5px;font-weight:600;white-space:nowrap}
.tab-badge{font-size:7px;margin-top:1px}
#content{padding-bottom:60px}
.sec{animation:fu 0.2s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.row{cursor:pointer;transition:background 0.1s;border-bottom:1px solid var(--border)}
.row:hover{background:rgba(255,255,255,0.03)}
.row-done{background:#0d1c10!important}
.ri{padding:13px 18px;display:flex;gap:12px;align-items:flex-start}
.chk{width:19px;height:19px;flex-shrink:0;border-radius:3px;border:1.5px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;transition:all 0.15s;cursor:pointer;margin-top:1px}
.chk.done{border-color:var(--teal);background:var(--teal);box-shadow:0 0 8px rgba(74,240,200,0.4)}
.chk.done span{color:#0e1420;font-size:10px;font-weight:900;line-height:1}
.chip{display:inline-block;border-radius:3px;padding:2px 7px;font-family:'Orbitron';font-size:8px;letter-spacing:1px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
.card-hd{padding:12px 14px;border-bottom:1px solid var(--border)}
.tg{display:flex;gap:8px;margin-bottom:12px}
.tb{flex:1;padding:9px;border-radius:4px;font-family:'Orbitron';font-size:9px;letter-spacing:2px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);transition:all 0.15s}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.sh{padding:12px 14px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:background 0.1s}
.sh:hover{background:rgba(255,255,255,0.03)}
.sx{padding:10px 14px 14px;background:var(--bg3);border-top:1px solid var(--border)}
.ib{border-radius:4px;padding:9px 10px;flex:1}
.lc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.yn{display:flex;gap:8px;margin-top:12px}
.ynb{flex:1;padding:11px;border-radius:4px;font-family:'Orbitron';font-size:9px;letter-spacing:2px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);transition:all 0.15s}
.cb{flex:1;padding:9px 0;border-radius:3px;font-family:'Orbitron';font-size:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);transition:all 0.15s}
.score-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:24px;text-align:center}
.nc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.nh{padding:14px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:background 0.1s}
.nh:hover{background:rgba(255,255,255,0.03)}
.nb{padding:12px 14px 14px 46px;background:var(--bg3);border-top:1px solid var(--border)}
.ep{background:var(--bg2);border-top:1px solid var(--border);padding:12px 18px 14px 50px}
.el{font-family:'Orbitron';font-size:8px;color:var(--text3);letter-spacing:2px;margin-bottom:8px}
.ir{display:flex;gap:8px;align-items:center;padding:3px 0;border-bottom:1px solid var(--border)}
.ir:last-child{border-bottom:none}
.dot{width:3px;height:3px;border-radius:50%;flex-shrink:0}
.rb{margin-top:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:12px}
.ri2{font-size:11px;color:var(--teal);font-style:italic;margin-bottom:10px;line-height:1.5}
.rs{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.rs:last-child{border-bottom:none}
.rn{font-family:'Orbitron';font-size:8px;color:var(--text3);flex-shrink:0;min-width:16px}
.rt{font-size:12px;color:var(--text2);line-height:1.6}
@keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(1000vh)}}
#scanline{position:fixed;left:0;right:0;height:1px;background:linear-gradient(transparent,rgba(74,240,200,0.04),transparent);animation:scan 8s linear infinite;pointer-events:none;z-index:999}
</style>
</head>
<body>
<div id="scanline"></div>
<div id="header">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div><div id="sys-label" class="orb">SYSTEM ACTIVE</div><div id="app-title">LOG</div></div>
    <div style="text-align:right"><div id="pct-val" class="orb">0%</div><div id="pct-label">PROTOCOL</div></div>
  </div>
  <div id="prog-wrap"><div id="prog-bar"></div></div>
  <div id="date-strip">
    <span class="orb" id="date-text" style="font-size:9px;color:var(--text3);letter-spacing:1px"></span>
    <span style="width:1px;height:8px;background:var(--border2)"></span>
    <span id="train-badge"></span>
    <button id="today-btn" onclick="goToday()" style="display:none;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:2px 8px;font-family:'Orbitron';font-size:8px;color:var(--teal);letter-spacing:1px">TODAY</button>
  </div>
  <div id="macro-strip">
    <div class="mc"><div class="mcl">CALORIES</div><div class="mcv" id="mc-cal" style="color:var(--gold)">-</div></div>
    <div class="mc"><div class="mcl">PROTEIN</div><div class="mcv" id="mc-pro" style="color:var(--teal)">-</div></div>
    <div class="mc"><div class="mcl">SESSION</div><div class="mcv" id="mc-sess" style="color:var(--purple);font-size:10px">-</div></div>
  </div>
</div>
<div id="cal-wrap"><div id="cal-inner"></div></div>
<div id="tabs">
  <button class="tab active" data-tab="meals" onclick="switchTab('meals')"><div class="tab-icon">&#9672;</div><div class="tab-label">FOOD</div><div class="tab-badge" id="b-meals">-</div></button>
  <button class="tab" data-tab="workout" onclick="switchTab('workout')"><div class="tab-icon">&#9679;</div><div class="tab-label">TRAIN</div><div class="tab-badge" id="b-workout">-</div></button>
  <button class="tab" data-tab="stretch" onclick="switchTab('stretch')"><div class="tab-icon">&#9678;</div><div class="tab-label">MOBILITY</div><div class="tab-badge" id="b-stretch">-</div></button>
  <button class="tab" data-tab="hair" onclick="switchTab('hair')"><div class="tab-icon">&#9671;</div><div class="tab-label">HAIR</div><div class="tab-badge" id="b-hair">-</div></button>
  <button class="tab" data-tab="vitamins" onclick="switchTab('vitamins')"><div class="tab-icon">&#9670;</div><div class="tab-label">STACK</div><div class="tab-badge" id="b-vitamins">-</div></button>
  <button class="tab" data-tab="notes" onclick="switchTab('notes')"><div class="tab-icon">&#9680;</div><div class="tab-label">NOTES</div><div class="tab-badge"></div></button>
  <button class="tab" data-tab="life" onclick="switchTab('life')"><div class="tab-icon">&#9681;</div><div class="tab-label">LIFE</div><div class="tab-badge"></div></button>
</div>
<div id="content"></div>

function buildCalendar(){
  var el=document.getElementById("cal-inner");
  el.innerHTML="";
  for(var i=-7;i<=7;i++){
    var d=new Date(todayDate);
    d.setDate(d.getDate()+i);
    var ds=d.toISOString().split("T")[0];
    var dw=d.getDay();
    var isTd=ds===todayStr;
    var isV=ds===viewDateStr;
    var isPast=ds<todayStr;
    var isMT=[0,4].indexOf(dw)>-1;
    var btn=document.createElement("button");
    btn.className="cd"+(isTd?" today":"")+(isV?" active":"");
    btn.innerHTML='<div class="orb" style="font-size:7px;letter-spacing:1px;color:'+(isV?"var(--teal)":isTd?"var(--text2)":isPast?"var(--text3)":"var(--text2)")+'">'+DS[dw]+'</div><div class="orb" style="font-size:14px;font-weight:700;color:'+(isV?"var(--teal)":isTd?"#fff":isPast?"var(--text3)":"var(--text)")+'">'+d.getDate()+'</div><div style="width:4px;height:4px;border-radius:50%;margin:3px auto 0;background:'+(isMT?"var(--red)":"var(--teal)")+';opacity:'+(isV?1:0.3)+'"></div>';

  document.getElementById("sys-label").textContent=isToday?"SYSTEM ACTIVE":"ARCHIVE VIEW";
  document.getElementById("date-text").textContent=DF[dow].slice(0,3)+" "+vd.getDate()+" "+MONTHS[vd.getMonth()]+" "+vd.getFullYear();

  document.getElementById("today-btn").style.display=isToday?"none":"inline-block";
  var meals=MEALS[dow]||[];
  document.getElementById("mc-cal").textContent=meals.reduce(function(s,m){return s+m.cal;},0).toLocaleString();
  document.getElementById("mc-pro").textContent=meals.reduce(function(s,m){return s+m.pro;},0)+"g";
  document.getElementById("mc-sess").textContent=TS[dow];
  if(isToday){
    var state=getState();
    var all=[],done=0;
    meals.forEach(function(_,i){all.push("m"+i);});
    var h=HAIR[dow];
    h.steps.forEach(function(_,i){all.push("h"+i);});
    if(h.nightSteps)h.nightSteps.forEach(function(_,i){all.push("hn"+i);});
    var wd=WORKOUT[dow];
    wd.exercises.forEach(function(_,i){all.push("wo"+i);});
    VITAMINS.filter(function(v){return!v.p;}).forEach(function(v){all.push("vit_"+v.id);});
    // stretch keys
    var gs=GYM_STRETCH[dow];
    if(gs){
      (gs.warmup||[]).forEach(function(_,i){all.push("sw"+i);});
      (gs.cooldown||[]).forEach(function(_,i){all.push("sc"+i);});
    }
    if(HAS_MMA[dow]){
      MMA_STRETCH.warmup.forEach(function(_,i){all.push("mw"+i);});
      MMA_STRETCH.cooldown.forEach(function(_,i){all.push("mc"+i);});
    }
    all.push("beer_done","gamble_done");
    all.forEach(function(k){if(state[k])done++;});
    var pct=all.length?Math.round((done/all.length)*100):0;
    var pc=pct===100?"var(--green)":pct>66?"var(--teal)":pct>33?"var(--gold)":"var(--red)";
    document.getElementById("pct-val").textContent=pct+"%";
    document.getElementById("pct-val").style.color=pc;
    document.getElementById("prog-bar").style.width=pct+"%";
    document.getElementById("prog-bar").style.background=pct===100?"var(--green)":"linear-gradient(90deg,#1a5a9a,var(--teal))";
    var mDone=meals.filter(function(_,i){return state["m"+i];}).length;
    document.getElementById("b-meals").textContent=mDone+"/"+meals.length;
    var wDone=wd.exercises.filter(function(_,i){return state["wo"+i];}).length;
    document.getElementById("b-workout").textContent=wDone+"/"+wd.exercises.length;
    var vDone=VITAMINS.filter(function(v){return!v.p&&state["vit_"+v.id];}).length;
    document.getElementById("b-vitamins").textContent=vDone+"/"+VITAMINS.filter(function(v){return!v.p;}).length;
    var hDone=h.steps.filter(function(_,i){return state["h"+i];}).length;
    document.getElementById("b-hair").textContent=hDone+"/"+h.steps.length;
    // stretch badge
    var stretchAll=0,stretchDone=0;
    if(gs){(gs.warmup||[]).forEach(function(_,i){stretchAll++;if(state["sw"+i])stretchDone++;});(gs.cooldown||[]).forEach(function(_,i){stretchAll++;if(state["sc"+i])stretchDone++;});}
    if(HAS_MMA[dow]){MMA_STRETCH.warmup.forEach(function(_,i){stretchAll++;if(state["mw"+i])stretchDone++;});MMA_STRETCH.cooldown.forEach(function(_,i){stretchAll++;if(state["mc"+i])stretchDone++;});}
    document.getElementById("b-stretch").textContent=stretchDone+"/"+stretchAll;
  } else {
    document.getElementById("pct-val").textContent=DS[dow];
    document.getElementById("pct-val").style.color="var(--text3)";
    document.getElementById("prog-bar").style.width="0%";
    var meals2=MEALS[dow]||[];
    document.getElementById("b-meals").textContent=meals2.length+" meals";
    document.getElementById("b-workout").textContent="";
    document.getElementById("b-vitamins").textContent="";
    document.getElementById("b-hair").textContent="";
    document.getElementById("b-stretch").textContent="";
  }
}

    h+='<div style="width:16px;height:16px;flex-shrink:0;border:1.5px solid '+(done?'var(--orange)':'var(--border2)')+';border-radius:2px;background:'+(done?'var(--orange)':'transparent')+';display:flex;align-items:center;justify-content:center">'+(done?'<span style="color:#0e1420;font-size:9px;font-weight:900">&#10003;</span>':'')+'</div>';
    h+='<div style="flex:1"><div style="font-size:12px;color:'+(done?'#4a3010':'var(--text)')+';text-decoration:'+(done?'line-through':'none')+'">'+s.name+'</div><div style="font-size:9px;color:var(--text3)">'+s.dur+'</div></div>';
    h+='</div></div>';
  });
  h+='</div>';
  // Exercise list
  h+='<div class="card"><div class="card-hd"><div class="orb" style="font-size:9px;color:var(--teal);letter-spacing:2px">'+workout.label.toUpperCase()+' EXERCISES</div></div>';
  workout.exercises.forEach(function(ex,i){
    var k="wo"+i,done=getTick(k),isOpen=openWorkout===i;
    h+='<div style="border-bottom:1px solid var(--border)">';
    h+='<div class="row'+(done?' row-done':'')+'" style="border-bottom:none" onclick="openWorkout=openWorkout==='+i+'?null:'+i+';renderContent()">';
    h+='<div style="padding:11px 14px;display:flex;gap:10px;align-items:center">';
    h+='<div onclick="event.stopPropagation();'+(isToday?'toggleTick(\''+k+'\')':'')+'" style="width:16px;height:16px;flex-shrink:0;border:1.5px solid '+(done?'var(--teal)':'var(--border2)')+';border-radius:2px;background:'+(done?'var(--teal)':'transparent')+';display:flex;align-items:center;justify-content:center;cursor:'+(isToday?'pointer':'default')+'">'+(done?'<span style="color:#0e1420;font-size:9px;font-weight:900">&#10003;</span>':'')+'</div>';
    h+='<div style="flex:1"><div style="font-size:13px;font-weight:600;color:'+(done?'#2a5a3a':'var(--text)')+';text-decoration:'+(done?'line-through':'none')+'">'+ex.n+'</div>';
    h+='<div class="orb" style="font-size:9px;color:var(--text3);margin-top:1px;letter-spacing:1px">'+ex.s+'</div></div>';
    h+='<span style="color:var(--text3);font-size:10px">'+(isOpen?"&#9650;":"&#9660;")+'</span></div></div>';
    if(isOpen)h+='<div style="padding:8px 14px 10px 44px;background:var(--bg3);border-top:1px solid var(--border)"><div style="font-size:12px;color:var(--teal);font-style:italic;line-height:1.5">'+ex.note+'</div></div>';
    h+='</div>';
  });
  h+='</div></div>';
  document.getElementById("content").innerHTML=h;
}

// ── STRETCH ───────────────────────────────────────────────────────────────────
function buildStretchList(items, keyPrefix, accentColor, isToday){
  var h="";
  items.forEach(function(s,i){
    var k=keyPrefix+i,done=getTick(k),open=openStretch===keyPrefix+"_"+i;
    h+='<div class="sc" style="border-color:'+(done?accentColor+'40':'var(--border)')+'"><div class="sh'+(done?' row-done':'')+'" onclick="openStretch=openStretch===\''+keyPrefix+'_'+i+'\'?null:\''+keyPrefix+'_'+i+'\';renderContent()">';
    h+='<div onclick="event.stopPropagation();'+(isToday?'toggleTick(\''+k+'\')':'')+'" style="width:19px;height:19px;flex-shrink:0;border:1.5px solid '+(done?accentColor:'var(--border2)')+';border-radius:3px;background:'+(done?accentColor:'transparent')+';display:flex;align-items:center;justify-content:center;cursor:'+(isToday?'pointer':'default')+';box-shadow:'+(done?'0 0 8px '+accentColor+'40':'none')+'">'+(done?'<span style="color:#0e1420;font-size:10px;font-weight:900">&#10003;</span>':'')+'</div>';
    h+='<div style="flex:1"><div style="font-size:13px;font-weight:600;color:'+(done?'#3a2a6a':'var(--text)')+';text-decoration:'+(done?'line-through':'none')+'">'+s.name+'</div><div style="font-size:9px;color:var(--text3);margin-top:1px">'+s.dur+'</div></div>';
    h+='<span style="color:var(--text3);font-size:10px">'+(open?"&#9650;":"&#9660;")+'</span></div>';
    if(open){
      h+='<div class="sx"><div style="font-family:Orbitron;font-size:8px;color:var(--text3);letter-spacing:2px;margin-bottom:8px">STEPS</div>';
      s.steps.forEach(function(st,j){h+='<div class="rs"><span class="rn">'+(j+1)+'.</span><span class="rt">'+st+'</span></div>';});
      h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">';
      h+='<div class="ib" style="background:var(--bg2);border:1px solid #1a4a2a"><div class="orb" style="font-size:7px;color:#2a6a3a;letter-spacing:1px;margin-bottom:4px">BREATHING</div><div style="font-size:11px;color:#4a8a5a;line-height:1.5">'+s.breath+'</div></div>';
      h+='<div class="ib" style="background:var(--bg2);border:1px solid #3a1818"><div class="orb" style="font-size:7px;color:#5a2a2a;letter-spacing:1px;margin-bottom:4px">COMMON MISTAKE</div><div style="font-size:11px;color:#7a3a3a;line-height:1.5">'+s.mistake+'</div></div>';
      h+='</div></div>';
    }
    h+='</div>';
  });
  return h;
}

function renderStretch(){
  var vd=new Date(viewDateStr+"T12:00:00"),dow=vd.getDay(),isToday=viewDateStr===todayStr;
  var hasGym=HAS_GYM[dow],hasMMA=HAS_MMA[dow];
  // Auto-set source if only one type
  if(hasGym&&!hasMMA)stretchSource="gym";
  if(hasMMA&&!hasGym)stretchSource="mma";

  var gymData=GYM_STRETCH[dow];
  var h='<div class="sec" style="padding:14px 18px">';

  // Source toggle - only show if day has both (future proofing) or just label current
  if(hasGym&&hasMMA){
    h+='<div class="tg" style="margin-bottom:10px">';
    h+='<button class="tb'+(stretchSource==="gym"?" active":"")+'" style="'+(stretchSource==="gym"?"background:#162a40;border-color:var(--teal);color:var(--teal)":"")+'" onclick="stretchSource=\'gym\';openStretch=null;renderContent()">&#127947; GYM</button>';
    h+='<button class="tb'+(stretchSource==="mma"?" active":"")+'" style="'+(stretchSource==="mma"?"background:#1a0f18;border-color:var(--red);color:var(--red)":"")+'" onclick="stretchSource=\'mma\';openStretch=null;renderContent()">&#129354; MMA</button>';
    h+='</div>';
  }

  // Warm-up / Cool-down toggle
  h+='<div class="tg">';
  h+='<button class="tb'+(stretchMode==="warmup"?" active":"")+'" style="'+(stretchMode==="warmup"?"background:#1a1208;border-color:var(--orange);color:var(--orange)":"")+'" onclick="stretchMode=\'warmup\';openStretch=null;renderContent()">WARM-UP</button>';
  h+='<button class="tb'+(stretchMode==="cooldown"?" active":"")+'" style="'+(stretchMode==="cooldown"?"background:#130f1a;border-color:var(--purple);color:var(--purple)":"")+'" onclick="stretchMode=\'cooldown\';openStretch=null;renderContent()">COOL-DOWN</button>';
  h+='</div>';

  // Show GYM PRE/POST option as additional toggles on gym days
  if(stretchSource==="gym"){
    h+='<div class="tg" style="margin-bottom:14px">';
    h+='<button class="tb'+(stretchMode==="gym_pre"?" active":"")+'" style="'+(stretchMode==="gym_pre"?"background:#0a1a10;border-color:var(--teal);color:var(--teal)":"")+'" onclick="stretchMode=\'gym_pre\';openStretch=null;renderContent()">GYM PRE</button>';
    h+='<button class="tb'+(stretchMode==="gym_post"?" active":"")+'" style="'+(stretchMode==="gym_post"?"background:#0a1a10;border-color:var(--green);color:var(--green)":"")+'" onclick="stretchMode=\'gym_post\';openStretch=null;renderContent()">GYM POST</button>';
    h+='</div>';
  }

  var items, keyPrefix, accentColor, sectionLabel;
  if(stretchSource==="mma"){
    if(stretchMode==="warmup"||stretchMode==="gym_pre"){items=MMA_STRETCH.warmup;keyPrefix="mw";accentColor="var(--red)";sectionLabel="MMA / MUAY THAI WARM-UP";}
    else{items=MMA_STRETCH.cooldown;keyPrefix="mc";accentColor="var(--blue)";sectionLabel="MMA / MUAY THAI COOL-DOWN";}
  } else if(stretchMode==="gym_pre"){
    items=GYM_PRE;keyPrefix="gp";accentColor="var(--teal)";sectionLabel="GYM PRE-WORKOUT";
  } else if(stretchMode==="gym_post"){
    items=GYM_POST;keyPrefix="go";accentColor="var(--green)";sectionLabel="GYM POST-WORKOUT";
  } else if(stretchMode==="warmup"){
    items=gymData?(gymData.warmup||[]):[];keyPrefix="sw";accentColor="var(--orange)";sectionLabel=(gymData?gymData.label+" ":"")+"WARM-UP";
  } else {
    items=gymData?(gymData.cooldown||[]):[];keyPrefix="sc";accentColor="var(--purple)";sectionLabel=(gymData?gymData.label+" ":"")+"COOL-DOWN";
  }

  h+='<div class="orb" style="font-size:9px;color:'+accentColor+';letter-spacing:2px;margin-bottom:12px">'+sectionLabel+'</div>';
  h+=buildStretchList(items,keyPrefix,accentColor,isToday);
  h+='</div>';
  document.getElementById("content").innerHTML=h;
}

// ── HAIR ──────────────────────────────────────────────────────────────────────
function renderHair(){
  var vd=new Date(viewDateStr+"T12:00:00"),dow=vd.getDay(),isToday=viewDateStr===todayStr;
  var hair=HAIR[dow];
  var h='<div class="sec" style="padding:14px 18px">';
  h+='<div style="margin-bottom:14px"><div class="orb" style="font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:8px">TODAY - '+hair.label.toUpperCase()+'</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:5px">';
  hair.products.forEach(function(p){h+='<span class="chip" style="background:var(--bg3);border:1px solid var(--border2);color:var(--teal)">'+p+'</span>';});
  h+='</div></div>';
  h+='<div class="orb" style="font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:8px">MORNING ROUTINE</div>';
  h+='<div class="card" style="margin-bottom:'+(hair.nightSteps?"14px":"0")+'">';
  hair.steps.forEach(function(s,i){
    var k="h"+i,done=getTick(k);
    h+='<div class="row'+(done?' row-done':'')+'" onclick="'+(isToday?'toggleTick(\''+k+'\')':'')+'">';
    h+='<div style="padding:12px 14px;display:flex;gap:12px;align-items:flex-start">';
    h+='<div style="width:19px;height:19px;flex-shrink:0;margin-top:1px;border:1.5px solid '+(done?'var(--teal)':'var(--border2)')+';border-radius:3px;background:'+(done?'var(--teal)':'transparent')+';display:flex;align-items:center;justify-content:center;box-shadow:'+(done?'0 0 8px var(--teal)40':'none')+'">'+(done?'<span style="color:#0e1420;font-size:10px;font-weight:900">&#10003;</span>':'')+'</div>';
    h+='<div style="flex:1"><span class="orb" style="font-size:8px;color:var(--text3);margin-right:8px">0'+(i+1)+'</span><span style="font-size:13px;color:'+(done?'#2a5a3a':'var(--text)')+';text-decoration:'+(done?'line-through':'none')+'">'+s+'</span></div>';
    h+='</div></div>';
  });
  h+='</div>';
  if(hair.nightSteps){
    h+='<div class="orb" style="font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:8px">POST-TRAINING RINSE</div>';
    h+='<div class="card">';
    hair.nightSteps.forEach(function(s,i){
      var k="hn"+i,done=getTick(k);
      h+='<div class="row'+(done?' row-done':'')+'" onclick="'+(isToday?'toggleTick(\''+k+'\')':'')+'">';
      h+='<div style="padding:12px 14px;display:flex;gap:12px;align-items:center">';
      h+='<div style="width:19px;height:19px;flex-shrink:0;border:1.5px solid '+(done?'var(--teal)':'var(--border2)')+';border-radius:3px;background:'+(done?'var(--teal)':'transparent')+';display:flex;align-items:center;justify-content:center">'+(done?'<span style="color:#0e1420;font-size:10px;font-weight:900">&#10003;</span>':'')+'</div>';
      h+='<span style="font-size:13px;color:'+(done?'#2a5a3a':'var(--text)')+';text-decoration:'+(done?'line-through':'none')+';flex:1">'+s+'</span>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  h+='</div>';
  document.getElementById("content").innerHTML=h;
}

// ── VITAMINS ──────────────────────────────────────────────────────────────────
function renderVitamins(){
  var isToday=viewDateStr===todayStr;
  var h='<div class="sec" style="padding:14px 18px">';
  h+='<div class="orb" style="font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:10px">ACTIVE STACK</div>';
  h+='<div class="card" style="margin-bottom:14px">';
  VITAMINS.filter(function(v){return!v.p;}).forEach(function(v){
    var k="vit_"+v.id,done=getTick(k);
    h+='<div class="row'+(done?' row-done':'')+'" onclick="'+(isToday?'toggleTick(\''+k+'\')':'')+'">';
    h+='<div style="padding:13px 14px;display:flex;gap:12px;align-items:center">';
    h+='<div style="width:19px;height:19px;flex-shrink:0;border:1.5px solid '+(done?'var(--green)':'var(--border2)')+';border-radius:3px;background:'+(done?'var(--green)':'transparent')+';display:flex;align-items:center;justify-content:center;box-shadow:'+(done?'0 0 8px var(--green)40':'none')+'">'+(done?'<span style="color:#0e1420;font-size:10px;font-weight:900">&#10003;</span>':'')+'</div>';
    h+='<div style="flex:1"><div style="font-size:13px;font-weight:600;color:'+(done?'#0a4a2a':'var(--text)')+';text-decoration:'+(done?'line-through':'none')+'">'+v.n+'</div>';
    h+='<div style="font-size:9px;color:var(--text3);margin-top:2px">'+v.time+' - '+v.note+'</div></div>';
    h+='</div></div>';
  });
  h+='</div>';
  h+='<div class="orb" style="font-size:9px;color:var(--border2);letter-spacing:2px;margin-bottom:8px">COMING SOON</div>';
  h+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;opacity:0.4">';
  VITAMINS.filter(function(v){return v.p;}).forEach(function(v){
    h+='<div style="padding:13px 14px;display:flex;gap:12px;align-items:center;border-bottom:1px solid var(--border)">';
    h+='<div style="width:19px;height:19px;flex-shrink:0;border:1px solid var(--border);border-radius:3px"></div>';
    h+='<div style="flex:1"><div style="font-size:13px;color:var(--text3);font-weight:600">'+v.n+'</div>';
    h+='<div style="font-size:9px;color:var(--text3);margin-top:2px">'+v.note+'</div></div>';
    h+='<span class="chip" style="background:var(--bg3);border:1px solid var(--border);color:var(--text3);font-size:7px">PENDING</span>';
    h+='</div>';
  });
  h+='</div></div>';
  document.getElementById("content").innerHTML=h;
}

// ── NOTES ─────────────────────────────────────────────────────────────────────
function renderNotes(){
  var vd=new Date(viewDateStr+"T12:00:00"),dow=vd.getDay();
  var notes=CORE_NOTES.concat(DAY_NOTES[dow]||[]);
  var h='<div class="sec" style="padding:14px 18px">';
  h+='<div class="orb" style="font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:12px">DIRECTIVES - '+DS[dow]+'</div>';
  notes.forEach(function(n){
    var open=openNote===n.id;
    h+='<div class="nc"><div class="nh" onclick="openNote=openNote===\''+n.id+'\'?null:\''+n.id+'\';renderContent()">';
    h+='<span style="font-size:20px;flex-shrink:0">'+n.icon+'</span>';
    h+='<div style="flex:1"><div style="font-size:15px;font-weight:600;color:var(--text);letter-spacing:0.5px">'+n.title+'</div></div>';
    h+='<span style="color:var(--text3);font-size:10px">'+(open?"&#9650;":"&#9660;")+'</span></div>';
    if(open)h+='<div class="nb"><div style="font-size:13px;color:var(--text2);line-height:1.7">'+n.body+'</div></div>';
    h+='</div>';
  });
  h+='</div>';
  document.getElementById("content").innerHTML=h;
}

// ── LIFESTYLE ─────────────────────────────────────────────────────────────────
function renderLife(){
  var isToday=viewDateStr===todayStr;
  var state=getState();
  var beer=state.beer_done!=null?state.beer_done:null;
  var bc=state.beer_count||1;
  var gamble=state.gamble_done!=null?state.gamble_done:null;
  var gw=state.gamble_what||"";
  var h='<div class="sec" style="padding:14px 18px">';
  // Beer
  h+='<div class="lc"><div style="display:flex;justify-content:space-between;align-items:flex-start">';
  h+='<div><div class="orb" style="font-size:13px;font-weight:700;color:var(--gold);letter-spacing:2px">&#127866; ALCOHOL</div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:4px;letter-spacing:1px">DID YOU DRINK TODAY?</div></div>';
  if(beer!==null)h+='<span class="chip" style="background:'+(beer?'#1a1408':'#081a10')+';border:1px solid '+(beer?'var(--gold)40':'var(--green)40')+';color:'+(beer?'var(--gold)':'var(--green)')+'">'+(beer?'YES - '+bc:'CLEAN')+'</span>';
  h+='</div><div class="yn">';
  h+='<button class="ynb" style="'+(beer===true?'background:#1a1408;border-color:var(--gold);color:var(--gold)':'')+'" onclick="setBeer(true)">YES</button>';
  h+='<button class="ynb" style="'+(beer===false?'background:#081a10;border-color:var(--green);color:var(--green)':'')+'" onclick="setBeer(false)">NO</button>';
  h+='</div>';
  if(beer){
    h+='<div style="margin-top:12px"><div class="orb" style="font-size:8px;color:var(--text3);letter-spacing:2px;margin-bottom:8px">HOW MANY?</div>';
    h+='<div style="display:flex;gap:6px">';
    [1,2,3,4,5,"6+"].forEach(function(n){h+='<button class="cb" style="'+(bc===n?'background:#1a1408;border-color:var(--gold);color:var(--gold)':'')+'" onclick="setBeerCount(\''+n+'\')">'+n+'</button>';});
    h+='</div></div>';
  }
  h+='</div>';
  // Gambling
  h+='<div class="lc"><div style="display:flex;justify-content:space-between;align-items:flex-start">';
  h+='<div><div class="orb" style="font-size:13px;font-weight:700;color:var(--red);letter-spacing:2px">&#127920; GAMBLING</div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:4px;letter-spacing:1px">DID YOU GAMBLE TODAY?</div></div>';
  if(gamble!==null)h+='<span class="chip" style="background:'+(gamble?'#1a0808':'#081a10')+';border:1px solid '+(gamble?'var(--red)40':'var(--green)40')+';color:'+(gamble?'var(--red)':'var(--green)')+'">'+(gamble?'YES':'CLEAN')+'</span>';
  h+='</div><div class="yn">';
  h+='<button class="ynb" style="'+(gamble===true?'background:#1a0808;border-color:var(--red);color:var(--red)':'')+'" onclick="setGamble(true)">YES</button>';
  h+='<button class="ynb" style="'+(gamble===false?'background:#081a10;border-color:var(--green);color:var(--green)':'')+'" onclick="setGamble(false)">NO</button>';
  h+='</div>';
  if(gamble){
    h+='<div style="margin-top:12px"><div class="orb" style="font-size:8px;color:var(--text3);letter-spacing:2px;margin-bottom:6px">WHAT / WHERE?</div>';
    h+='<input value="'+gw+'" oninput="setGambleWhat(this.value)" placeholder="sports bet, pokies, etc..." style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:10px 12px;color:var(--text);font-size:13px"></div>';
  }
  h+='</div>';
  // Score
  if(isToday){
    var vd=new Date(viewDateStr+"T12:00:00"),dow=vd.getDay();
    var all=[];
    (MEALS[dow]||[]).forEach(function(_,i){all.push("m"+i);});
    HAIR[dow].steps.forEach(function(_,i){all.push("h"+i);});
    if(HAIR[dow].nightSteps)HAIR[dow].nightSteps.forEach(function(_,i){all.push("hn"+i);});
    WORKOUT[dow].exercises.forEach(function(_,i){all.push("wo"+i);});
    VITAMINS.filter(function(v){return!v.p;}).forEach(function(v){all.push("vit_"+v.id);});
    all.push("beer_done","gamble_done");
    var done=all.filter(function(k){return state[k];}).length;
    var pct=all.length?Math.round((done/all.length)*100):0;
    var pc=pct===100?"var(--green)":pct>66?"var(--teal)":pct>33?"var(--gold)":"var(--red)";
    h+='<div class="score-card" style="'+(pct===100?'background:#081a0c;border-color:var(--green)30':'')+'"><div class="orb" style="font-size:9px;color:var(--text3);letter-spacing:3px;margin-bottom:10px">DAY SCORE</div>';
    h+='<div style="font-family:Orbitron;font-size:48px;font-weight:900;color:'+pc+';line-height:1">'+pct+'<span style="font-size:20px">%</span></div>';
    h+='<div style="font-size:11px;color:var(--text3);margin-top:10px;letter-spacing:2px">'+(pct===100?"PROTOCOL COMPLETE":(all.length-done)+" ITEMS REMAINING")+'</div></div>';
  }
  h+='</div>';
  document.getElementById("content").innerHTML=h;
}

function setBeer(v){if(viewDateStr!==todayStr)return;saveState({beer_done:v});updateHeader();renderLife();}
function setBeerCount(n){if(viewDateStr!==todayStr)return;saveState({beer_count:n});renderLife();}
function setGamble(v){if(viewDateStr!==todayStr)return;saveState({gamble_done:v});updateHeader();renderLife();}
function setGambleWhat(v){if(viewDateStr!==todayStr)return;saveState({gamble_what:v});}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
fetchHevy();
</script>
</body>
