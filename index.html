<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1420;
  --bg2: #131b28;
  --bg3: #192030;
  --bg4: #1e2838;
  --border: #1e3048;
  --border2: #253a55;
  --text: #ddeeff;
  --text2: #8aaac8;
  --text3: #4a6a8a;
  --teal: #4af0c8;
  --gold: #f0d060;
  --purple: #b088ff;
  --orange: #ff9040;
  --red: #ff5555;
  --green: #30e888;
  --blue: #60b8ff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--border2)}
.orb{font-family:'Orbitron',monospace}
button{cursor:pointer;border:none;font-family:'Rajdhani',sans-serif}
input{outline:none;font-family:'Rajdhani',sans-serif}
input::placeholder{color:var(--text3)}

/* HEADER */
#header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 18px 12px;position:sticky;top:0;z-index:50}
#header-top{display:flex;justify-content:space-between;align-items:flex-start}
#app-title{font-family:'Orbitron';font-size:26px;font-weight:900;color:#fff;letter-spacing:4px;text-shadow:0 0 20px rgba(74,240,200,0.2)}
#system-label{font-family:'Orbitron';font-size:9px;letter-spacing:4px;color:var(--text3);margin-bottom:3px}
#pct-val{font-family:'Orbitron';font-size:22px;font-weight:700;transition:color 0.3s}
#pct-label{font-family:'Orbitron';font-size:8px;color:var(--text3);letter-spacing:2px}
#progress-bar-wrap{margin-top:10px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
#progress-bar{height:100%;width:0%;transition:width 0.5s ease;border-radius:2px}
#date-strip{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
#training-badge{font-size:12px;color:var(--teal);font-weight:600;letter-spacing:0.5px}
#macro-strip{display:flex;gap:8px;margin-top:10px}
.macro-chip{background:var(--bg3);border-radius:4px;padding:6px 10px;border:1px solid var(--border2)}
.macro-chip-label{font-family:'Orbitron';font-size:7px;color:var(--text3);letter-spacing:1.5px;margin-bottom:2px}
.macro-chip-val{font-family:'Orbitron';font-size:12px;font-weight:700}

/* CALENDAR */
#cal-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
#cal-wrap::-webkit-scrollbar{display:none}
#cal-inner{display:flex;padding:8px 10px;gap:5px;min-width:max-content}
.cal-day{min-width:42px;padding:7px 4px;border-radius:5px;text-align:center;background:transparent;border:1px solid transparent;transition:all 0.15s;cursor:pointer}
.cal-day:hover{background:rgba(74,240,200,0.06)}
.cal-day.today{background:var(--bg3);border-color:var(--border2)}
.cal-day.active{background:#162a40;border-color:var(--teal)}
.cal-day-name{font-family:'Orbitron';font-size:7px;letter-spacing:1px}
.cal-day-num{font-family:'Orbitron';font-size:14px;font-weight:700;margin-top:2px}
.cal-dot{width:4px;height:4px;border-radius:50%;margin:3px auto 0}

/* TABS */
#tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 13px;border-bottom:2px solid transparent;color:var(--text3);transition:all 0.15s;background:none}
.tab.active{border-bottom-color:var(--teal);color:var(--teal)}
.tab-icon{font-family:'Orbitron';font-size:8px;letter-spacing:1px;margin-bottom:2px}
.tab-label{font-size:9px;letter-spacing:1.5px;font-weight:600;white-space:nowrap}
.tab-badge{font-size:7px;margin-top:1px;letter-spacing:1px}

/* CONTENT */
#content{padding-bottom:60px}
.section{animation:fadeUp 0.2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ROWS */
.row{cursor:pointer;transition:background 0.1s;border-bottom:1px solid var(--border)}
.row:hover{background:rgba(255,255,255,0.03)}
.row-inner{padding:13px 18px;display:flex;gap:12px;align-items:flex-start}
.checkbox{width:19px;height:19px;flex-shrink:0;border-radius:3px;border:1.5px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;transition:all 0.15s;cursor:pointer;margin-top:1px}
.checkbox.done{border-color:var(--teal);background:var(--teal);box-shadow:0 0 8px rgba(74,240,200,0.4)}
.checkbox.done span{color:#0e1420;font-size:10px;font-weight:900;line-height:1}
.row-done{background:#0d1c10 !important}

/* CHIPS */
.chip{display:inline-block;border-radius:3px;padding:2px 7px;font-family:'Orbitron';font-size:8px;letter-spacing:1px}
.time-chip{font-family:'Orbitron';font-size:8px;color:var(--text3)}

/* EXPAND PANELS */
.expand-panel{background:var(--bg2);border-top:1px solid var(--border);padding:12px 18px 14px 50px}
.expand-label{font-family:'Orbitron';font-size:8px;color:var(--text3);letter-spacing:2px;margin-bottom:8px}
.ingredient-row{display:flex;gap:8px;align-items:center;padding:3px 0;border-bottom:1px solid var(--border)}
.ingredient-row:last-child{border-bottom:none}
.dot{width:3px;height:3px;border-radius:50%;flex-shrink:0}
.recipe-box{margin-top:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:12px}
.recipe-intro{font-size:11px;color:var(--teal);font-style:italic;margin-bottom:10px;line-height:1.5}
.recipe-step{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.recipe-step:last-child{border-bottom:none}
.recipe-step-num{font-family:'Orbitron';font-size:8px;color:var(--text3);flex-shrink:0;min-width:16px}
.recipe-step-text{font-size:12px;color:var(--text2);line-height:1.6}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
.card-header{padding:12px 14px;border-bottom:1px solid var(--border)}
.card-title{font-family:'Orbitron';font-size:9px;letter-spacing:2px}

/* STRETCH */
.stretch-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.stretch-header{padding:12px 14px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:background 0.1s}
.stretch-header:hover{background:rgba(255,255,255,0.03)}
.stretch-expand{padding:10px 14px 14px;background:var(--bg3);border-top:1px solid var(--border)}
.stretch-steps{margin-bottom:10px}
.stretch-step{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--border)}
.stretch-step:last-child{border-bottom:none}
.info-box{border-radius:4px;padding:9px 10px;flex:1}

/* TOGGLE BUTTONS */
.toggle-group{display:flex;gap:8px;margin-bottom:14px}
.toggle-btn{flex:1;padding:9px;border-radius:4px;font-family:'Orbitron';font-size:9px;letter-spacing:2px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);transition:all 0.15s}
.toggle-btn.active{background:#162a40;border-color:var(--teal);color:var(--teal)}

/* LIFESTYLE */
.life-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.yes-no{display:flex;gap:8px;margin-top:12px}
.yes-no-btn{flex:1;padding:11px;border-radius:4px;font-family:'Orbitron';font-size:9px;letter-spacing:2px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);transition:all 0.15s}
.count-group{display:flex;gap:6px;margin-top:10px}
.count-btn{flex:1;padding:9px 0;border-radius:3px;font-family:'Orbitron';font-size:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);transition:all 0.15s}

/* SCORE */
.score-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:24px;text-align:center}
.score-val{font-family:'Orbitron';font-size:48px;font-weight:900;line-height:1;transition:color 0.3s}

/* NOTES */
.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.note-header{padding:14px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:background 0.1s}
.note-header:hover{background:rgba(255,255,255,0.03)}
.note-body{padding:0 14px 14px 46px;background:var(--bg3);border-top:1px solid var(--border);padding-top:12px}

/* VITAMINS */
.pending-item{padding:13px 14px;display:flex;gap:12px;align-items:center;border-bottom:1px solid var(--border);opacity:0.4}

/* SCAN LINE */
@keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(1000vh)}}
#scanline{position:fixed;left:0;right:0;height:1px;background:linear-gradient(transparent,rgba(74,240,200,0.05),transparent);animation:scan 8s linear infinite;pointer-events:none;z-index:999}

/* TODAY ONLY overlay */
.readonly-overlay{position:absolute;inset:0;z-index:5;cursor:default}
</style>
</head>
<body>
<div id="scanline"></div>
<div id="header">
  <div id="header-top">
    <div>
      <div id="system-label" class="orb">SYSTEM ACTIVE</div>
      <div id="app-title">LOG</div>
    </div>
    <div style="text-align:right">
      <div id="pct-val" class="orb">0%</div>
      <div id="pct-label">PROTOCOL</div>
    </div>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="date-strip">
    <span class="orb" id="date-text" style="font-size:9px;color:var(--text3);letter-spacing:1px"></span>
    <span style="width:1px;height:8px;background:var(--border2)"></span>
    <span id="training-badge"></span>
    <button id="today-btn" onclick="goToday()" style="display:none;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:2px 8px;font-family:'Orbitron';font-size:8px;color:var(--teal);letter-spacing:1px">→ TODAY</button>
  </div>
  <div id="macro-strip">
    <div class="macro-chip"><div class="macro-chip-label">CALORIES</div><div class="macro-chip-val" id="macro-cal" style="color:var(--gold)">—</div></div>
    <div class="macro-chip"><div class="macro-chip-label">PROTEIN</div><div class="macro-chip-val" id="macro-pro" style="color:var(--teal)">—</div></div>
    <div class="macro-chip"><div class="macro-chip-label">SESSION</div><div class="macro-chip-val" id="macro-session" style="color:var(--purple);font-size:10px">—</div></div>
  </div>
</div>

<div id="cal-wrap"><div id="cal-inner"></div></div>

<div id="tabs">
  <button class="tab active" data-tab="meals" onclick="switchTab('meals')">
    <div class="tab-icon">◈</div><div class="tab-label">FOOD</div><div class="tab-badge" id="badge-meals">0/0</div>

  <button class="tab" data-tab="workout" onclick="switchTab('workout')">
    <div class="tab-icon">◉</div><div class="tab-label">TRAIN</div><div class="tab-badge" id="badge-workout">0/0</div>
  </button>
  <button class="tab" data-tab="stretch" onclick="switchTab('stretch')">
    <div class="tab-icon">◎</div><div class="tab-label">MOBILITY</div><div class="tab-badge" id="badge-stretch">0/0</div>
  </button>
  <button class="tab" data-tab="hair" onclick="switchTab('hair')">
    <div class="tab-icon">◇</div><div class="tab-label">HAIR</div><div class="tab-badge" id="badge-hair">0/0</div>
  </button>
  <button class="tab" data-tab="vitamins" onclick="switchTab('vitamins')">
    <div class="tab-icon">◆</div><div class="tab-label">STACK</div><div class="tab-badge" id="badge-vitamins">0/0</div>
  </button>
  <button class="tab" data-tab="notes" onclick="switchTab('notes')">
    <div class="tab-icon">◐</div><div class="tab-label">NOTES</div><div class="tab-badge"></div>
  </button>
  <button class="tab" data-tab="life" onclick="switchTab('life')">
    <div class="tab-icon">◑</div><div class="tab-label">LIFE</div><div class="tab-badge"></div>
  </button>
</div>

<div id="content"></div>

function getState() {
  try { return JSON.parse(localStorage.getItem("log_v4_"+viewDateStr)||"{}"); } catch { return {}; }
}
function saveState(patch) {
  try {
    const s = getState();
    Object.assign(s, patch);
    localStorage.setItem("log_v4_"+viewDateStr, JSON.stringify(s));
  } catch {}
}
function getTick(k) { return !!getState()[k]; }
function toggleTick(k) {
  if (viewDateStr !== todayStr) return;
  const s = getState();
  s[k] = !s[k];
  saveState(s);
  render();
}

// ── CALENDAR ─────────────────────────────────────────────────────────────────
function buildCalendar() {
  const el = document.getElementById("cal-inner");
  el.innerHTML = "";
  for (let i = -7; i <= 7; i++) {
    const d = new Date(todayDate);
    d.setDate(d.getDate() + i);
    const ds = d.toISOString().split("T")[0];
    const dw = d.getDay();
    const isTd = ds === todayStr;
    const isV = ds === viewDateStr;
    const isPast = ds < todayStr;
    const isMT = [0,4].includes(dw);
    const btn = document.createElement("button");
    btn.className = "cal-day" + (isTd?" today":"") + (isV?" active":"");
    btn.innerHTML = `<div class="cal-day-name orb" style="color:${isV?"var(--teal)":isTd?"var(--text2)":isPast?"var(--text3)":"var(--text2)"}">${DAYS_SHORT[dw]}</div><div class="cal-day-num orb" style="color:${isV?"var(--teal)":isTd?"#fff":isPast?"var(--text3)":"var(--text)"}">${d.getDate()}</div><div class="cal-dot" style="background:${isMT?"var(--red)":"var(--teal)"};opacity:${isV?1:0.3}"></div>`;
    btn.onclick = () => { viewDateStr = ds; render(); scrollCalToActive(); };
    el.appendChild(btn);
  }
}

function scrollCalToActive() {
  const el = document.getElementById("cal-inner");
  const active = el.querySelector(".cal-day.active");
  if (active) active.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
}

  document.getElementById("macro-session").textContent = TRAIN_SESSION[dow];

  // progress
  if (isToday) {
    const state = getState();
    const allKeys = [];
    meals.forEach((_,i) => allKeys.push("m"+i));
    (HAIR[dow].steps||[]).forEach((_,i) => allKeys.push("h"+i));
    (HAIR[dow].nightSteps||[]).forEach((_,i) => allKeys.push("hn"+i));
    const stretches = STRETCHES[dow];
    [...(stretches.warmup||[]),...(stretches.cooldown||[])].forEach((_,i) => allKeys.push("s"+i));

    WORKOUT[dow].exercises.forEach((_,i) => allKeys.push("wo"+i));
    allKeys.push("beer_done","gamble_done");

    const done = allKeys.filter(k=>state[k]).length;

      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="orb" style="font-size:13px;font-weight:700;color:var(--gold);letter-spacing:2px">🍺 ALCOHOL</div>
          <div style="font-size:10px;color:var(--text3);margin-top:4px;letter-spacing:1px">DID YOU DRINK TODAY?</div>
        </div>
        ${beer!==null?`<span class="chip" style="background:${beer?"#1a1408":"#081a10"};border:1px solid ${beer?"var(--gold)40":"var(--green)40"};color:${beer?"var(--gold)":"var(--green)"}">${beer?`YES — ${beerCount}`:"CLEAN"}</span>`:""}
      </div>
      <div class="yes-no">
        <button class="yes-no-btn ${beer===true?"active-yes":""}" style="${beer===true?"background:#1a1408;border-color:var(--gold);color:var(--gold)":""}" onclick="setBeer(true)">YES</button>
        <button class="yes-no-btn ${beer===false?"active-no":""}" style="${beer===false?"background:#081a10;border-color:var(--green);color:var(--green)":""}" onclick="setBeer(false)">NO</button>
      </div>
      ${beer?`<div style="margin-top:12px">
        <div class="orb" style="font-size:8px;color:var(--text3);letter-spacing:2px;margin-bottom:8px">HOW MANY?</div>
        <div class="count-group">
          ${[1,2,3,4,5,"6+"].map(n=>`<button class="count-btn" style="${beerCount===n?"background:#1a1408;border-color:var(--gold);color:var(--gold)":""}" onclick="setBeerCount(${typeof n==="number"?n:"'6+'"})">  ${n}</button>`).join("")}
        </div>
      </div>`:""}
    </div>

    <div class="life-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="orb" style="font-size:13px;font-weight:700;color:var(--red);letter-spacing:2px">🎰 GAMBLING</div>
          <div style="font-size:10px;color:var(--text3);margin-top:4px;letter-spacing:1px">DID YOU GAMBLE TODAY?</div>
        </div>
        ${gamble!==null?`<span class="chip" style="background:${gamble?"#1a0808":"#081a10"};border:1px solid ${gamble?"var(--red)40":"var(--green)40"};color:${gamble?"var(--red)":"var(--green)"}">${gamble?"YES":"CLEAN"}</span>`:""}
      </div>
      <div class="yes-no">
        <button class="yes-no-btn" style="${gamble===true?"background:#1a0808;border-color:var(--red);color:var(--red)":""}" onclick="setGamble(true)">YES</button>
        <button class="yes-no-btn" style="${gamble===false?"background:#081a10;border-color:var(--green);color:var(--green)":""}" onclick="setGamble(false)">NO</button>
      </div>
      ${gamble?`<div style="margin-top:12px">
        <div class="orb" style="font-size:8px;color:var(--text3);letter-spacing:2px;margin-bottom:6px">WHAT / WHERE?</div>
        <input value="${gambleWhat}" oninput="setGambleWhat(this.value)" placeholder="sports bet, pokies, etc..."
          style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:10px 12px;color:var(--text);font-size:13px">
      </div>`:""}
    </div>

    ${isToday?`<div class="score-card" style="${pct===100?"background:#081a0c;border-color:var(--green)30":""}">
      <div class="orb" style="font-size:9px;color:var(--text3);letter-spacing:3px;margin-bottom:10px">DAY SCORE</div>
      <div class="score-val" style="color:${pctColor};text-shadow:0 0 30px ${pct===100?"#30e888":pct>66?"#4af0c8":pct>33?"#f0d060":"#ff5555"}50">
        ${pct}<span style="font-size:20px">%</span>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:10px;letter-spacing:2px">
        ${pct===100?"PROTOCOL COMPLETE":`${totalKeys.length-done} ITEMS REMAINING`}
      </div>
    </div>`:""}
  </div>`;
  document.getElementById("content").innerHTML = h;
}

function setBeer(v) {
  if (viewDateStr!==todayStr) return;
  saveState({beer_done:v});
  saveState({beer_done:v});
  updateHeader();
  renderLife();
}
function setBeerCount(n) {
  if (viewDateStr!==todayStr) return;
  saveState({beer_count:n});
  updateHeader();
  renderLife();
}
function setGamble(v) {
  if (viewDateStr!==todayStr) return;
  saveState({gamble_done:v});
  updateHeader();
  renderLife();
}
function setGambleWhat(v) {
  if (viewDateStr!==todayStr) return;
  saveState({gamble_what:v});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
fetchHevy();
</script>
</body>
</html>
